<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="你已經看見了一種靠近永續的方式。接下來，可以選擇一條更靠近自己的路。">
  <meta property="og:title" content="ECO STAR｜接下來，你可以選擇一條更靠近自己的路">
  <meta property="og:description" content="不用急著決定。先選一條你現在最想靠近的方向。">
  <meta property="og:type" content="website">
  <title>ECO STAR｜接下來，你可以選擇一條更靠近自己的路</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Wishlite 色票（沿用 trust-wall.html）── */
    :root {
      --gold: #c49a6c;
      --gold-light: #d4b896;
      --gold-dark: #a07844;
      --moss: #3d5a3e;
      --moss-dark: #2e4630;
      --moss-soft: #7a9e7e;
      --mist: #d4e4d0;
      --mist-soft: #e6efe3;
      --cream: #f7f3ec;
      --paper: #f5f2ea;
      --paper-warm: #efe7da;
      --paper-soft: #faf7f0;
      --charcoal: #2c2c2c;
      --brown: #8b6f47;
      --brown-warm: #a08665;
      --muted: #766d62;
      --line: rgba(92, 74, 47, 0.12);
      --shadow-soft: 0 8px 24px rgba(32, 39, 34, 0.06);
      --shadow-lift: 0 18px 42px rgba(32, 39, 34, 0.10);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--charcoal);
      background: var(--paper);
      -webkit-font-smoothing: antialiased;
      line-height: 1.7;
      overflow-x: hidden;
      width: 100%;
    }
    /* 中文斷行防護：CJK 需要 line-break: anywhere 才能任意斷字 */
    h1, h2, p, a {
      word-wrap: break-word;
      overflow-wrap: anywhere;
      line-break: anywhere;
    }

    img { max-width: 100%; height: auto; display: block; }

    .container {
      width: 100%;
      min-width: 0;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 32px;
    }
    /* flex child 預設 min-width: auto 會阻止內容 shrink，要強制設 0 */
    .hero, .paths, .closing-section { min-width: 0; }
    .hero-inner, .closing-inner, .paths-grid { min-width: 0; }

    /* ──────────────────────────────────
       SECTION 1 ｜ HERO（約 30vh）
       小芽：右下角 / 偏側、120-160px、opacity 0.9
       文字：置中、最大寬 640px
       ────────────────────────────────── */
    .hero {
      min-height: 30vh;
      padding: 70px 0 28px;
      background: linear-gradient(180deg, var(--paper-warm) 0%, var(--paper) 100%);
      position: relative;
      display: flex;
      align-items: center;
    }
    .hero-inner {
      max-width: 640px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .hero-kicker {
      color: var(--moss);
      font-size: 14px;
      letter-spacing: 0.14em;
      margin-bottom: 22px;
      font-weight: 500;
    }
    .hero-title {
      font-family: 'Noto Serif TC', serif;
      font-weight: 700;
      font-size: clamp(28px, 4.2vw, 40px);
      line-height: 1.5;
      color: var(--moss-dark);
      margin-bottom: 32px;
      letter-spacing: 0.02em;
    }
    .hero-sub {
      font-size: 16px;
      line-height: 1.95;
      color: var(--charcoal);
    }
    .hero-sub p { margin-bottom: 18px; }
    .hero-sub p:last-child { margin-bottom: 0; }
    .hero-sub .closing {
      color: var(--brown);
      font-weight: 500;
      margin-top: 26px;
    }
    /* Quiz 回灌：水彩框 pill（明顯可點，但不搶 Hero 主標）*/
    .hero-quiz-link {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 26px 12px 28px;
      background:
        radial-gradient(ellipse 120% 70% at 30% 30%, rgba(212, 228, 208, 0.55), transparent 70%),
        linear-gradient(135deg, rgba(247, 243, 236, 0.95), rgba(232, 220, 200, 0.6));
      border: 1.5px solid rgba(122, 158, 126, 0.55);
      border-radius: 100px;
      color: var(--moss-dark);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: all 0.32s ease;
      box-shadow:
        0 3px 14px rgba(122, 158, 126, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      position: relative;
    }
    .hero-quiz-link::before {
      content: "🌱";
      margin-right: 8px;
      opacity: 0.9;
    }
    .hero-quiz-link::after {
      content: " →";
      margin-left: 6px;
      opacity: 0.7;
    }
    .hero-quiz-link:hover {
      background:
        radial-gradient(ellipse 120% 70% at 30% 30%, rgba(212, 228, 208, 0.78), transparent 70%),
        linear-gradient(135deg, rgba(247, 243, 236, 1), rgba(232, 220, 200, 0.85));
      border-color: var(--moss);
      transform: translateY(-2px);
      box-shadow:
        0 8px 22px rgba(122, 158, 126, 0.20),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }
    @media (max-width: 768px) {
      .hero-quiz-link { font-size: 13.5px; padding: 11px 22px 11px 24px; margin-top: 24px; }
    }
    /* 分流 CTA Hint（位於六友下方、卡片之前 — 帶呼喚感）*/
    .paths-cta-hint {
      text-align: center;
      margin: 4px auto 0;
      padding: 0 24px;
    }
    .paths-cta-hint .cta-text {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      color: var(--moss-dark);
      font-weight: 600;
      letter-spacing: 0.06em;
      display: inline-block;
    }
    .paths-cta-hint .cta-arrow {
      display: block;
      margin-top: 10px;
      font-size: 18px;
      color: var(--moss-soft);
      animation: hintBob 2.4s ease-in-out infinite;
    }
    @keyframes hintBob {
      0%, 100% { transform: translateY(0); opacity: 0.75; }
      50% { transform: translateY(4px); opacity: 1; }
    }
    @media (max-width: 768px) {
      .paths-cta-hint { margin: 2px auto 0; }
      .paths-cta-hint .cta-text { font-size: 16px; }
      .paths-cta-hint .cta-arrow { font-size: 16px; }
    }

    /* 六友環繞地球收尾：頭尾呼應（六友手牽手=我們一起 / 六友環繞地球=我們一起守護一件事）*/
    .mascot-closing {
      display: flex;
      justify-content: center;
      margin-top: 14px;
      margin-bottom: 0;
      padding: 0 24px;
    }
    .mascot-closing img {
      width: 340px;
      max-width: 88%;
      height: auto;
      opacity: 0.95;
    }
    @media (max-width: 768px) {
      .mascot-closing { margin-top: 10px; margin-bottom: 0; padding: 0 16px; }
      .mascot-closing img { width: 240px; }
    }

    /* ──────────────────────────────────
       六友手牽手：情緒延伸（不主導畫面）
       桌機 420px / 手機 260px / opacity 0.9
       無陰影、無動畫、無 hover
       ────────────────────────────────── */
    .hero-friends {
      text-align: center;
      margin: 8px auto 4px;
      padding: 0 24px;
    }
    .hero-friends img {
      display: inline-block;
      width: 420px;
      max-width: 90%;
      height: auto;
      opacity: 0.9;
    }
    @media (max-width: 768px) {
      .hero-friends { margin: 4px auto 0; padding: 0 16px; }
      .hero-friends img { width: 260px; }
    }

    /* ──────────────────────────────────
       SECTION 2 ｜ 分流卡（約 50vh）
       桌機：A 55% / B 45%
       A 暖棕自然色 / B 微霧綠
       Mascot 小圖點綴在右下角 40-60px
       ────────────────────────────────── */
    .paths {
      min-height: auto;
      padding: 28px 0 36px;
      background: var(--paper);
      display: flex;
      align-items: center;
    }
    .paths-grid {
      display: grid;
      /* A 安心探索 45% / B 主要行動 55%（B 視覺權重略高 10-20%） */
      grid-template-columns: 45fr 55fr;
      gap: 28px;
      width: 100%;
      align-items: stretch;
    }
    .path-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      position: relative;
      transition: box-shadow 0.32s ease, background 0.32s ease, border-color 0.32s ease;
      overflow: hidden;
      cursor: pointer; /* 整張可點 */
      /* 標題+內文於上半、CTA 由 margin-top:auto 推至底（兩卡同水平線）*/
    }

    /* 卡 A：暖棕 / 安心探索 / 視覺較淡（明度 +8%）*/
    .path-card-a {
      background: linear-gradient(180deg, #fdfaf3 0%, #f3ead8 100%);
      padding: 40px 36px 34px;
      box-shadow: 0 6px 18px rgba(139, 111, 71, 0.07);
    }
    .path-card-a:hover {
      background: linear-gradient(180deg, #fcf7ec 0%, #ede2ca 100%);
      box-shadow: 0 8px 22px rgba(139, 111, 71, 0.10);
      border-color: rgba(160, 134, 101, 0.30);
    }

    /* 卡 B：微霧綠 / 主要行動 / 對比略高 + 陰影 +20% + padding +12px */
    .path-card-b {
      background: linear-gradient(180deg, #ecf3e8 0%, #d8e8d3 100%);
      padding: 52px 40px 46px;
      box-shadow: 0 10px 28px rgba(61, 90, 62, 0.13);
      border-color: rgba(122, 158, 126, 0.30);
    }
    .path-card-b:hover {
      background: linear-gradient(180deg, #e6eee0 0%, #cde0c5 100%);
      box-shadow: 0 14px 36px rgba(61, 90, 62, 0.18);
      border-color: rgba(61, 90, 62, 0.42);
    }

    /* 整張卡可點：用 JS click handler 模式（保留文字可選 + 全卡 hover）*/
    .path-card { user-select: text; }

    .path-title {
      font-family: 'Noto Serif TC', serif;
      font-weight: 700;
      font-size: 24px;
      color: var(--moss-dark);
      margin-bottom: 18px;
      line-height: 1.5;
      /* 確保兩張卡標題區塊等高（容納 2 行）+ 置中 */
      min-height: calc(24px * 1.5 * 2);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      width: 100%;
    }
    /* 標題陰影：A 卡極淡、B 卡略強 +10% 提注意力 */
    .path-card-a .path-title {
      color: #6e5436;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
    }
    .path-card-b .path-title {
      color: var(--moss-dark);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.10);
    }

    /* 中段標籤：輕量分類提示（非完整句子）*/
    .path-body {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 32px;
      opacity: 0.85;
      text-align: center;
      min-height: calc(13.5px * 1.6);
    }

    .path-button {
      display: inline-block;
      padding: 0 26px;
      height: 46px;
      line-height: 46px;
      border-radius: 100px;
      font-weight: 500;
      font-size: 15px;
      text-decoration: none;
      text-align: center;
      transition: all 0.25s ease;
      letter-spacing: 0.04em;
      align-self: center; /* CTA 置中對齊 */
      margin-top: auto;   /* 推到底部、兩卡同水平線 */
    }
    /* A 按鈕：咖啡色實心、飽和度略低於 B、陰影輕量 */
    .path-card-a .path-button {
      background: #a08665;       /* 咖啡棕（brown-warm，飽和度低於 B 的苔綠）*/
      color: var(--paper-soft);
      border: 1.5px solid #a08665;
      box-shadow: 0 3px 10px rgba(139, 111, 71, 0.14);
    }
    .path-card-a .path-button:hover {
      background: #8b6f47;       /* hover 略加深到 brown */
      border-color: #8b6f47;
      transform: none;
      box-shadow: 0 4px 12px rgba(139, 111, 71, 0.20);
    }

    /* B 按鈕：實心苔綠（主色）/ 陰影 +12% / hover 反應更明顯 */
    .path-card-b .path-button {
      background: var(--moss);
      color: var(--paper-soft);
      border: 1.5px solid var(--moss);
      box-shadow: 0 5px 16px rgba(61, 90, 62, 0.22);
    }
    .path-card-b .path-button:hover {
      background: var(--moss-dark);    /* hover 加深而非變淡，行動感更強 */
      border-color: var(--moss-dark);
      transform: none;
      box-shadow: 0 8px 22px rgba(61, 90, 62, 0.32);
    }

    /* （A/B 卡角落 mascot 已移除：2026-05-03 Apple 拍板，把 IP 集中在六友合照頭尾呼應，
        其他角色留給招生頁與案例頁繼續發揮）*/

    /* ──────────────────────────────────
       SECTION 3 ｜ 溫柔收束（約 20vh）
       字體變小、opacity 降低、行距寬、輕量連結（無底線/極淡）
       ────────────────────────────────── */
    .closing-section {
      min-height: 20vh;
      padding: 70px 0 60px;
      background: linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%);
      text-align: center;
      display: flex;
      align-items: center;
    }
    .closing-inner { width: 100%; }
    .closing-text {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      line-height: 2.1;
      color: var(--moss-dark);
      max-width: 480px;
      margin: 0 auto 36px;
      font-weight: 500;
      opacity: 0.85;
    }
    .closing-text p { margin-bottom: 12px; }
    .closing-text p:last-child { margin-bottom: 0; }

    .quiz-link {
      display: inline-block;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      padding: 4px 0;
      opacity: 0.7;
      transition: opacity 0.25s ease, color 0.25s ease;
      letter-spacing: 0.02em;
    }
    .quiz-link:hover {
      opacity: 1;
      color: var(--moss);
    }

    /* ──────────────────────────────────
       FOOTER ｜ 山脈地平線（約 10vh）
       opacity 10-20%、霧綠/淡棕、輕微 blur
       看得到感覺、看不到細節
       ────────────────────────────────── */
    footer {
      position: relative;
      min-height: auto;
      background: linear-gradient(180deg, var(--paper-warm) 0%, #ece2d0 100%);
      padding: 50px 0 32px;
      overflow: hidden;
    }
    /* Wishlite 提案級山脈（hero-mountain-warm.jpg）— 沿用葉脈拾光封面血統 */
    .horizon-photo {
      position: absolute;
      left: 0; right: 0;
      bottom: 0;
      width: 100%;
      height: 220px;
      background-image: url('https://wishlite.github.io/wishlite-proposals/assets/hero-mountain-warm.jpg');
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
      opacity: 0.48;
      pointer-events: none;
      z-index: 0;
    }
    /* 上緣漸層遮罩：山脈淡入紙感、不要硬切（較輕的遮罩，讓山的輪廓更明顯）*/
    .horizon-photo::before {
      content: "";
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 100%;
      background: linear-gradient(180deg,
        var(--paper-warm) 0%,
        rgba(239, 231, 218, 0.70) 14%,
        rgba(239, 231, 218, 0.30) 32%,
        rgba(239, 231, 218, 0.08) 58%,
        transparent 85%);
      pointer-events: none;
    }
    .footer-inner {
      position: relative;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding-top: 50px;
      opacity: 0.75;
    }
    .footer-brand {
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      color: var(--moss-dark);
      font-size: 15px;
      margin-bottom: 6px;
      opacity: 0.85;
    }

    /* ──────────────────────────────────
       手機版（768px 以下）
       小芽：移到 Hero 下方居中、不卡角落
       卡片：直式 / A 在上 B 在下
       ────────────────────────────────── */
    /* 桌機才用的 br，手機隱藏避免破版 */
    .br-desktop { display: inline; }

    /* 手機統一拿掉 path-body 的 br，讓中文自然斷行 */
    @media (max-width: 768px) {
      .path-body br { display: none; }
    }

    @media (max-width: 768px) {
      .hero {
        min-height: auto;
        padding: 56px 0 44px;
        display: block;
      }
      .paths { display: block; }
      .closing-section { display: block; }
      .hero-inner {
        max-width: 100%;
      }
      .hero-title {
        font-size: 23px;
        line-height: 1.55;
        margin-bottom: 26px;
        letter-spacing: 0;
        word-break: break-all;
      }
      .hero-sub { font-size: 15px; line-height: 1.95; word-break: break-all; }
      .hero-kicker { letter-spacing: 0.06em; word-break: keep-all; }
      .hero-sub p { margin-bottom: 14px; }
      .hero-hint { margin-top: 32px; font-size: 12.5px; }

      .paths {
        min-height: auto;
        padding: 22px 0 28px;
      }
      .paths-grid {
        grid-template-columns: 1fr;
        gap: 18px;
        width: 100%;
      }
      /* 手機版 B 卡在上、A 卡在下（B 是主要行動入口）*/
      .path-card-b { order: 1; }
      .path-card-a { order: 2; }
      .path-card {
        padding: 32px 24px 28px;
        width: 100%;
      }
      .path-title { font-size: 20px; line-height: 1.5; margin-bottom: 16px; }
      .path-body { font-size: 14.5px; margin-bottom: 24px; line-height: 1.9; }
      .path-button { font-size: 14.5px; padding: 0 22px; height: 44px; line-height: 44px; }
      .path-mascot { width: 46px; height: 46px; right: 16px; bottom: 16px; }

      .closing-section { min-height: auto; padding: 52px 0 44px; }
      .closing-text { font-size: 16px; line-height: 1.95; }

      .container { padding: 0 20px; max-width: 100%; }

      /* 手機隱藏桌機才用的 br */
      .br-desktop { display: none; }
    }

    /* 進場淡入（極輕） */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 0.92; transform: translateY(0); }
    }
    .hero-kicker, .hero-title, .hero-sub { animation: fadeUp 0.6s ease-out both; }
    .hero-title { animation-delay: 0.1s; }
    .hero-sub { animation-delay: 0.2s; }
    .path-card-a { animation: fadeUp 0.7s 0.05s ease-out both; opacity: 1; }
    .path-card-b { animation: fadeUp 0.7s 0.18s ease-out both; opacity: 1; }
  </style>
</head>
<body>

  <!--
    ╔═══════════════════════════════════════════════════════════╗
    ║ 🌱 IP 視覺原則（Tony 2026-05-03 拍板）：                    ║
    ║                                                            ║
    ║    IP 延續情緒，不主導畫面。                                ║
    ║                                                            ║
    ║ 規則 v3（2026-05-03 Apple 拍板：頭尾六友合照雙呼應）：     ║
    ║  ✅ 六友手牽手（Hero 下方）= 「我們一起」                  ║
    ║  ✅ 六友環繞地球（Footer 山脈上方）= 「把行動帶回世界」    ║
    ║  ❌ A/B 卡片角落 mascot 已移除（IP 集中在頭尾）            ║
    ║  ❌ Hero 不放小芽單體                                      ║
    ║  ❌ Footer 山脈不放角色                                    ║
    ║  ❌ 不做角色介紹 / 不放 IP 當主視覺                        ║
    ║  📌 其他角色（小渣/小蠔/小棉/小塑/小仔）保留給招生頁/案例頁║
    ║                                                            ║
    ║ 等六友 PNG 路徑確認後一次處理。現狀為 ship-ready 凍結版。  ║
    ╚═══════════════════════════════════════════════════════════╝
  -->

  <!-- ────────── SECTION 1 ｜ HERO ────────── -->
  <section class="hero" aria-labelledby="hero-title">
    <div class="container">
      <div class="hero-inner">
        <p class="hero-kicker">你已經看見了一種靠近永續的方式</p>
        <h1 id="hero-title" class="hero-title">
          接下來，<br class="br-desktop">你可以選擇一條更靠近自己的路
        </h1>
        <div class="hero-sub">
          <p>每個人靠近永續的速度都不一樣。</p>
          <p>有人先從故事開始，有人先從方法開始。</p>
