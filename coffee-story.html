<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我是一粒咖啡渣 ☕ 互動故事</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #0a0503;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── Layout ─── */
        #game { width:100%; max-width:480px; margin:0 auto; min-height:100vh; }

        #main-view {
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        /* ─── Scene Header ─── */
        #scene-header {
            height: 44vh; min-height: 220px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            transition: background 0.9s ease;
        }

        .chapter-label {
            position: absolute; top: 18px; left: 0; right: 0;
            text-align: center;
            font-size: 11px; font-weight: 700; letter-spacing: 3px;
            color: rgba(255,255,255,0.55); text-transform: uppercase;
        }

        #scene-emoji {
            font-size: 76px; line-height: 1;
            animation: float 4s ease-in-out infinite;
            position: relative; z-index: 1;
            cursor: default;
            transition: font-size 0.4s;
        }
        @keyframes float {
            0%,100% { transform: translateY(0) scale(1); }
            50%      { transform: translateY(-14px) scale(1.06); }
        }

        /* ─── Text Panel ─── */
        #text-panel {
            flex: 1;
            background: #0a0503;
            border-radius: 28px 28px 0 0;
            margin-top: -28px;
            padding: 30px 22px 36px;
            position: relative; z-index: 2;
            min-height: 56vh;
            display: flex; flex-direction: column;
        }

        #skip-hint {
            font-size: 11px; color: rgba(160,130,90,0.45);
            text-align: right; margin-bottom: 12px;
            height: 14px; transition: opacity 0.3s;
        }

        #narration {
            font-size: 15px; color: #cfc0a0;
            line-height: 2; white-space: pre-line;
            margin-bottom: 22px;
            flex: 1;
            min-height: 80px;
        }

        #question {
            font-size: 16px; font-weight: 700; color: #f0e0c0;
            line-height: 1.6; white-space: pre-line;
            margin-bottom: 18px;
            opacity: 0; transition: opacity 0.5s;
        }
        #question.show { opacity: 1; }

        /* ─── Choices ─── */
        #choices {
            display: flex; flex-direction: column; gap: 10px;
            opacity: 0; transform: translateY(12px);
            transition: opacity 0.4s, transform 0.4s;
        }
        #choices.show { opacity: 1; transform: translateY(0); }

        .choice-btn {
            background: #170d07;
            border: 2px solid rgba(200,150,55,0.28);
            border-radius: 15px;
            padding: 14px 16px;
            color: #e0caa0;
            font-size: 14px; font-weight: 600;
            cursor: pointer; text-align: left;
            display: flex; align-items: center; gap: 12px;
            transition: all 0.2s; line-height: 1.4;
        }
        .choice-btn:hover {
            background: #241408;
            border-color: #c89638;
            transform: translateX(5px);
        }
        .choice-btn.picked {
            border-color: #c89638;
            background: #241408;
        }
        .choice-btn:disabled { pointer-events: none; }
        .ce { font-size: 22px; flex-shrink: 0; }

        /* ─── ENDING SCREEN ─── */
        #ending-screen {
            display: none; flex-direction: column;
            min-height: 100vh;
        }
        #ending-screen.show { display: flex; }

        #ending-header {
            padding: 52px 24px 28px;
            text-align: center; position: relative;
            transition: background 0.8s;
        }
        .end-emoji {
            font-size: 80px; display: block;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        .end-title {
            font-size: 22px; font-weight: 900; color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        #ending-body {
            flex: 1;
            background: #0a0503;
            border-radius: 28px 28px 0 0;
            margin-top: -28px;
            padding: 28px 22px 40px;
            overflow-y: auto;
        }

        .end-narration {
            font-size: 15px; color: #cfc0a0;
            line-height: 2; white-space: pre-line;
            margin-bottom: 22px;
        }

        .end-tag {
            background: rgba(200,150,55,0.1);
            border: 1px solid rgba(200,150,55,0.3);
            border-radius: 14px; padding: 16px;
            margin-bottom: 14px;
        }
        .end-tag-lbl {
            font-size: 10px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            color: #c89638; margin-bottom: 5px;
        }
        .end-tag-val {
            font-size: 16px; font-weight: 700; color: #f0e0c0;
        }

        .end-fact {
            font-size: 13px; color: #907a58;
            line-height: 1.8; padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px; margin-bottom: 22px;
        }

        .end-cta-box {
            background: linear-gradient(135deg, #201008, #170d07);
            border: 1px solid rgba(200,150,55,0.28);
            border-radius: 18px; padding: 22px;
            text-align: center;
        }
        .end-cta-q {
            font-size: 15px; font-weight: 700;
            color: #f0e0c0; margin-bottom: 16px; line-height: 1.5;
        }
        .btn-cta {
            display: block; width: 100%; padding: 15px;
            background: linear-gradient(135deg, #e8b850, #c89638);
            color: #120800; font-size: 15px; font-weight: 700;
            border: none; border-radius: 12px; cursor: pointer;
            margin-bottom: 10px; transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(200,150,55,0.3);
        }
        .btn-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(200,150,55,0.4);
        }
        .btn-restart {
            display: block; width: 100%; padding: 12px;
            background: transparent; color: #806850;
            font-size: 14px; font-weight: 600;
            border: 2px solid rgba(128,104,80,0.3);
            border-radius: 12px; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-restart:hover { border-color: rgba(128,104,80,0.6); color: #c0a070; }

        /* ─── Scene backgrounds ─── */
        .bg-open   { background: radial-gradient(ellipse at 50% 70%, #3d1f0a 0%, #0a0503 70%); }
        .bg-morn   { background: linear-gradient(150deg, #b85a18, #e09030); }
        .bg-saved  { background: linear-gradient(150deg, #9a5010, #d49830); }
        .bg-plant  { background: linear-gradient(150deg, #1a4820, #2e7830); }
        .bg-bloom  { background: linear-gradient(150deg, #205820, #a83858); }
        .bg-skin   { background: linear-gradient(150deg, #b84828, #d07848); }
        .bg-craft  { background: linear-gradient(150deg, #481808, #884020); }
        .bg-cool   { background: linear-gradient(150deg, #182840, #285878); }
        .bg-bad    { background: linear-gradient(150deg, #100f18, #181820); }

        /* ─── Particles ─── */
        .ptcl {
            position: fixed; pointer-events: none;
            font-size: 18px; z-index: 999;
            animation: ptclDrop linear forwards;
        }
        @keyframes ptclDrop {
            from { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
            to   { transform: translateY(110vh) rotate(540deg); opacity: 0; }
        }

        /* ─── Title screen extras ─── */
        .big-sub {
            font-size: 13px; color: rgba(200,170,120,0.7);
            letter-spacing: 1px; text-align: center;
            margin-top: 10px; position: relative; z-index: 1;
        }

        /* ─── Responsive ─── */
        @media (max-width: 360px) {
            #scene-emoji { font-size: 60px; }
            #text-panel { padding: 24px 16px 30px; }
            .choice-btn { padding: 12px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>
<div id="game">

    <!-- ── Main game view ── -->
    <div id="main-view">
        <div id="scene-header" class="bg-open">
            <div class="chapter-label" id="chapter-label"></div>
            <div id="scene-emoji">☕</div>
            <div class="big-sub" id="scene-sub"></div>
        </div>
        <div id="text-panel">
            <div id="skip-hint">點擊畫面加速對話 →</div>
            <div id="narration"></div>
            <div id="question"></div>

        </div>
    </div>

    <!-- ── Ending view ── -->
    <div id="ending-screen">
        <div id="ending-header">
            <span class="end-emoji" id="end-emoji"></span>
            <div class="end-title" id="end-title"></div>
        </div>
        <div id="ending-body">
            <div class="end-narration" id="end-narration"></div>
            <div class="end-tag">
                <div class="end-tag-lbl" id="end-tag-lbl">你的第二人生</div>
                <div class="end-tag-val" id="end-tag-val"></div>
            </div>
            <div class="end-fact" id="end-fact"></div>
            <div class="end-cta-box">
                <div class="end-cta-q" id="end-cta-q"></div>
                <button class="btn-cta" id="btn-cta" onclick="gotoCTA()">探索韻手作體驗課程 →</button>
                <button class="btn-restart" onclick="restart()">重新體驗故事 ↺</button>
            </div>
        </div>
    </div>

</div><!-- #game -->

/* ════════════════════════════════════════
   ENGINE
════════════════════════════════════════ */
let twTimer = null;
let twDone   = false;

function goTo(id) {
    const scene = S[id];
    if (!scene) return;
    if (scene.isEnding) { showEnding(scene); return; }

    // header
    const hdr = document.getElementById('scene-header');
    hdr.className = scene.bg;
    document.getElementById('scene-emoji').textContent  = scene.emoji;
    document.getElementById('chapter-label').textContent = scene.chapter || '';
    document.getElementById('scene-sub').textContent    = scene.sub || '';

    // reset text area
    document.getElementById('question').classList.remove('show');
    document.getElementById('choices').classList.remove('show');
    document.getElementById('choices').innerHTML = '';
    document.getElementById('skip-hint').style.opacity = '1';

    // typewriter
    typewrite(scene.narration || '', () => {
        document.getElementById('skip-hint').style.opacity = '0';
        const q = document.getElementById('question');
        q.textContent = scene.question || '';
        q.classList.add('show');
        setTimeout(() => {
            renderChoices(scene.choices);
            document.getElementById('choices').classList.add('show');
        }, 200);
    });

    // skip on tap
    const panel = document.getElementById('text-panel');
    panel.onclick = () => {
        if (!twDone) {
            clearTimeout(twTimer);
            document.getElementById('narration').textContent = scene.narration || '';
            finishTypewrite();
        }
    };
}

function typewrite(text, cb) {
    clearTimeout(twTimer);
    twDone = false;
    const el = document.getElementById('narration');
    el.textContent = '';
    const chars = [...text];
    let i = 0;
    function tick() {
        if (i < chars.length) {
            el.textContent += chars[i++];
            const delay = chars[i-1] === '\n' ? 90 : chars[i-1] === '。' || chars[i-1] === '…' ? 60 : 20;
            twTimer = setTimeout(tick, delay);
        } else {
            twDone = true;
            if (cb) cb();
        }
    }
    window._twCb = cb;
    tick();
}

function finishTypewrite() {
    twDone = true;
    document.getElementById('skip-hint').style.opacity = '0';
    const q = document.getElementById('question');
    q.classList.add('show');
    setTimeout(() => {
        document.getElementById('choices').classList.add('show');
    }, 200);
    if (window._twCb) { window._twCb(); window._twCb = null; }
}

function renderChoices(choices) {
    const box = document.getElementById('choices');
    box.innerHTML = '';
    choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="ce">${c.e}</span><span>${c.t}</span>`;
        btn.onclick = () => {
            box.querySelectorAll('.choice-btn').forEach(b => { b.disabled = true; });
            btn.classList.add('picked');
            setTimeout(() => goTo(c.next), 380);
        };
        box.appendChild(btn);
    });
}

/* ─── ENDING ─── */
function showEnding(scene) {
    // remove skip listener
    document.getElementById('text-panel').onclick = null;

    document.getElementById('main-view').style.display = 'none';
    const es = document.getElementById('ending-screen');
    es.classList.add('show');

    document.getElementById('ending-header').style.background = scene.endBg;
    document.getElementById('end-emoji').textContent = scene.endEmoji;
    document.getElementById('end-title').textContent  = scene.endTitle;
    document.getElementById('end-narration').textContent = scene.narration;
    document.getElementById('end-tag-lbl').textContent = scene.tagLbl || '你的第二人生';
    document.getElementById('end-tag-val').textContent  = scene.tag;
    document.getElementById('end-fact').textContent    = scene.fact;
    document.getElementById('end-cta-q').textContent   = scene.cta;

    if (scene.type === 'bad') {
        document.getElementById('btn-cta').style.display = 'none';
    } else {
        document.getElementById('btn-cta').style.display = 'block';
        launchParticles(scene.endEmoji);
    }
}

function launchParticles(emoji) {
    const emojis = ['✨','🌟',emoji,'☕','🌿'];
    for (let i = 0; i < 12; i++) {
        setTimeout(() => {
            const p = document.createElement('div');
            p.className = 'ptcl';
            p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            p.style.left = (5 + Math.random() * 90) + 'vw';
            p.style.animationDuration = (2.5 + Math.random() * 3) + 's';
            p.style.fontSize = (14 + Math.random() * 16) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 6000);
        }, i * 180);
    }
}

function gotoCTA() {
    window.open('https://wishlite.github.io/wishlite-esg/', '_blank');
}

function restart() {
    clearTimeout(twTimer);
    document.getElementById('main-view').style.display = 'flex';
    document.getElementById('ending-screen').classList.remove('show');
    document.getElementById('question').classList.remove('show');
    document.getElementById('choices').classList.remove('show');
    document.getElementById('choices').innerHTML = '';
    goTo('opening');
}

/* ─── Init ─── */
goTo('opening');
</script>
