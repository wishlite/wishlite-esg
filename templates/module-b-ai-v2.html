  .pillar__num-box { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; border: 2px solid; border-radius: 4px; font-family: 'Playfair Display', serif; font-style: italic; font-weight: 500; font-size: 24px; }
  .pillar__title { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 38px; color: var(--ink); letter-spacing: 2px; margin-top: 8px; }
  .pillar__subtitle { font-family: 'Noto Sans TC', sans-serif; font-weight: 500; font-size: 18px; color: var(--ink-soft); letter-spacing: 1px; }
  .pillar__body { font-family: 'Noto Sans TC', sans-serif; font-weight: 400; font-size: 16px; line-height: 1.85; color: var(--ink); opacity: 0.78; letter-spacing: 0.4px; margin-top: 12px; }
  .pillar__label { font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: var(--ink-mute); letter-spacing: 1px; line-height: 1.6; padding-top: 16px; border-top: 1px solid var(--line); margin-top: 20px; }

  /* ===== P03 總覽 ===== */
  .page--overview .page__main { display: flex; flex-direction: column; padding: 0 16px; }
  .overview__title { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 52px; color: var(--ink); letter-spacing: 1.5px; margin-bottom: 12px; }
  .overview__subtitle { font-family: 'Noto Sans TC', sans-serif; font-size: 22px; color: var(--ink-soft); letter-spacing: 0.8px; margin-bottom: 52px; }
  .overview__list { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 28px; }
  .overview__item { padding: 28px; background: rgba(255,255,255,0.4); border: 1px solid var(--line); border-radius: 4px; }
  .overview__item-no { font-family: 'Playfair Display', serif; font-style: italic; font-size: 16px; color: var(--accent); letter-spacing: 2px; margin-bottom: 10px; }
  .overview__item-name { font-family: 'Noto Serif TC', serif; font-weight: 600; font-size: 24px; color: var(--ink); letter-spacing: 1px; margin-bottom: 8px; }
  .overview__item-tag { font-family: 'Noto Sans TC', sans-serif; font-size: 16px; color: var(--ink-soft); letter-spacing: 0.5px; }

  /* ===== P04 WHY US ===== */
  .page--why .page__main { display: flex; flex-direction: column; padding: 0 16px; }
  .why__title { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 52px; color: var(--ink); letter-spacing: 1.5px; margin-bottom: 12px; }
  .why__subtitle { font-family: 'Noto Sans TC', sans-serif; font-size: 22px; color: var(--ink-soft); letter-spacing: 0.8px; margin-bottom: 52px; }
  .why__columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 48px; }
  .why__col { padding-top: 24px; border-top: 2px solid var(--accent); }
  .why__icon { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 48px; color: var(--terra); letter-spacing: 2px; margin-bottom: 16px; }
  .why__col-title { font-family: 'Noto Serif TC', serif; font-weight: 600; font-size: 28px; color: var(--ink); letter-spacing: 1px; margin-bottom: 18px; }
  .why__col-body { font-family: 'Noto Sans TC', sans-serif; font-size: 18px; line-height: 1.85; color: var(--ink); opacity: 0.78; letter-spacing: 0.4px; }

  /* ===== P05 客製化 ===== */
  .page--customization .page__main { display: flex; flex-direction: column; padding: 0 16px; }
  .cust__title { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 52px; color: var(--ink); letter-spacing: 1.5px; margin-bottom: 12px; }
  .cust__subtitle { font-family: 'Noto Sans TC', sans-serif; font-size: 22px; color: var(--ink-soft); letter-spacing: 0.8px; margin-bottom: 48px; }
  .cust__grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 32px; margin-bottom: 36px; }
  .cust__item { display: flex; gap: 24px; padding: 28px; background: rgba(255,255,255,0.4); border-left: 3px solid var(--sage); border-radius: 0 4px 4px 0; }
  .cust__item-icon { flex-shrink: 0; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: var(--sage); color: white; border-radius: 4px; font-family: 'Playfair Display', serif; font-style: italic; font-weight: 500; font-size: 20px; }
  .cust__item-label { font-family: 'Noto Serif TC', serif; font-weight: 600; font-size: 22px; color: var(--ink); margin-bottom: 8px; letter-spacing: 1px; }
  .cust__item-body { font-family: 'Noto Sans TC', sans-serif; font-size: 16px; line-height: 1.75; color: var(--ink); opacity: 0.78; }
  .cust__note { font-family: 'Noto Serif TC', serif; font-style: italic; font-weight: 500; font-size: 20px; color: var(--ink-soft); padding: 24px 32px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); text-align: center; letter-spacing: 1.5px; }

  /* ===== P06 執行方式 ===== */
  .page--execution .page__main { display: flex; flex-direction: column; padding: 0 16px; }
  .exec__title { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 52px; color: var(--ink); letter-spacing: 1.5px; margin-bottom: 12px; }
  .exec__subtitle { font-family: 'Noto Sans TC', sans-serif; font-size: 22px; color: var(--ink-soft); letter-spacing: 0.8px; margin-bottom: 16px; }
  .exec__mode-tag { display: inline-block; padding: 4px 14px; background: var(--terra); color: white; border-radius: 14px; font-size: 13px; letter-spacing: 2px; margin-bottom: 40px; }
  .exec__steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 32px; }
  .exec__step { padding: 28px 24px; background: rgba(255,255,255,0.4); border-top: 3px solid var(--accent); border-radius: 0 0 4px 4px; }
  .exec__step-no { font-family: 'Playfair Display', serif; font-style: italic; font-size: 28px; color: var(--accent); letter-spacing: 2px; margin-bottom: 12px; }
  .exec__step-label { font-family: 'Noto Serif TC', serif; font-weight: 600; font-size: 22px; color: var(--ink); margin-bottom: 6px; letter-spacing: 1px; }
  .exec__step-duration { font-family: 'Playfair Display', serif; font-style: italic; font-size: 14px; color: var(--sage); letter-spacing: 1.5px; margin-bottom: 14px; }
  .exec__step-body { font-family: 'Noto Sans TC', sans-serif; font-size: 14px; line-height: 1.75; color: var(--ink); opacity: 0.78; }
  .exec__note { font-family: 'Noto Sans TC', sans-serif; font-size: 15px; color: var(--ink-mute); padding-top: 20px; border-top: 1px solid var(--line); letter-spacing: 0.8px; line-height: 1.7; }

  /* ===== P07–P10 商品頁 ===== */
  .page--product .page__main { display: grid; grid-template-columns: 800px 1fr; column-gap: 60px; align-items: center; }
  .product__image { position: relative; height: 100%; max-height: 800px; border-radius: 4px; overflow: hidden; background: var(--paper-warm); }
  .product__image-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
  .product__info { padding-right: 32px; }
  .product__no { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 500; font-size: 18px; color: var(--golden); letter-spacing: 4px; margin-bottom: 14px; }
  .product__no::before { content: ""; display: inline-block; width: 32px; height: 1.5px; background: var(--golden); margin-right: 14px; vertical-align: middle; }
  .product__name { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 40px; color: var(--ink); letter-spacing: 1px; line-height: 1.3; margin-bottom: 12px; word-break: keep-all; }
  .product__subtitle { font-family: 'Noto Sans TC', sans-serif; font-size: 20px; color: var(--ink-soft); letter-spacing: 1.5px; margin-bottom: 28px; }
  .product__section { margin-bottom: 22px; }
  .product__section-label { font-family: 'Noto Sans TC', sans-serif; font-weight: 600; font-size: 13px; color: var(--terra); letter-spacing: 4px; margin-bottom: 8px; }
  .product__section-body { font-family: 'Noto Sans TC', sans-serif; font-size: 15px; line-height: 1.8; color: var(--ink); opacity: 0.82; letter-spacing: 0.4px; }
  .product__sdgs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .sdg-tag { background: var(--sage); color: white; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 16px; letter-spacing: 1px; }

  /* ===== P11 ESG 影響力 ===== */
  .page--impact .page__main { display: flex; flex-direction: column; padding: 0 16px; }
  .impact__title { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 52px; color: var(--ink); letter-spacing: 1.5px; margin-bottom: 12px; }
  .impact__subtitle { font-family: 'Noto Sans TC', sans-serif; font-size: 22px; color: var(--ink-soft); letter-spacing: 0.8px; margin-bottom: 48px; }
  .impact__grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 36px; }
  .impact__metric { padding: 36px 28px; background: var(--paper-warm); border-radius: 4px; text-align: center; border-bottom: 3px solid var(--sage); }
  .impact__metric-value { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 56px; color: var(--terra); letter-spacing: 1px; line-height: 1; margin-bottom: 4px; }
  .impact__metric-unit { font-family: 'Playfair Display', serif; font-style: italic; font-size: 16px; color: var(--ink-soft); letter-spacing: 1px; margin-bottom: 18px; }
  .impact__metric-label { font-family: 'Noto Serif TC', serif; font-weight: 600; font-size: 18px; color: var(--ink); margin-bottom: 6px; letter-spacing: 1px; }
  .impact__metric-note { font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: var(--ink-mute); letter-spacing: 0.5px; }
  .impact__statement { font-family: 'Noto Serif TC', serif; font-style: italic; font-weight: 500; font-size: 22px; color: var(--ink); padding: 28px 40px; border-left: 3px solid var(--terra); background: rgba(255,255,255,0.4); line-height: 1.7; letter-spacing: 1px; }

  /* ===== P12 結尾金句 ===== */
  .page--closing .page__main { display: flex; flex-direction: column; justify-content: center; padding: 0 80px; max-width: 1500px; }
  .closing__accent { width: 60px; height: 1.5px; background: var(--accent); margin-bottom: 40px; }
  .closing__headline { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 80px; color: var(--ink); letter-spacing: 2px; margin-bottom: 56px; }
  .closing__body { font-family: 'Noto Sans TC', sans-serif; font-weight: 400; font-size: 26px; line-height: 2.0; color: var(--ink); opacity: 0.78; letter-spacing: 1px; max-width: 1100px; white-space: pre-line; margin-bottom: 52px; }
  .closing__signature { font-family: 'Noto Serif TC', serif; font-weight: 700; font-style: italic; font-size: 32px; color: var(--terra); letter-spacing: 4px; padding-top: 28px; border-top: 1px solid var(--line); max-width: 700px; }

  /* ===== P13 Contact (hard-code) ===== */
  .page--contact .page__inner { padding: 0; display: flex; flex-direction: column; }
  .contact__hero { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #E8E4D5 0%, #D6CFB8 100%); }
  .contact__hero-title { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 80px; letter-spacing: 12px; color: var(--ink); }
  .contact__band { background: var(--paper-warm); padding: 32px 64px; display: grid; grid-template-columns: 320px 1fr; column-gap: 48px; align-items: center; }
  .contact__band-left { display: flex; flex-direction: column; gap: 16px; }
  .contact__brand-mark { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 500; font-size: 38px; color: var(--ink-soft); line-height: 1; }
  .contact__brand-mark-zh { font-family: 'Noto Sans TC', sans-serif; font-weight: 400; font-size: 12px; color: var(--ink-mute); letter-spacing: 6px; margin-top: 4px; }
  .contact__pills { display: flex; gap: 8px; margin-top: 8px; }
  .pill { padding: 6px 14px; border-radius: 16px; font-family: 'Noto Sans TC', sans-serif; font-size: 12px; font-weight: 500; color: white; letter-spacing: 1.5px; }
  .pill--aesthetics { background: #C75A3A; }
  .pill--creativity { background: #C8A058; }
  .pill--life { background: #7D8F72; }
  .pill--sustainable { background: #A67C52; }
  .contact__info { display: flex; flex-direction: column; gap: 12px; font-family: 'Noto Sans TC', sans-serif; font-size: 16px; color: var(--ink); letter-spacing: 0.5px; }
  .contact__info-row { display: flex; align-items: center; gap: 12px; }
  .contact__info-icon { width: 28px; height: 28px; border-radius: 50%; background: var(--sage); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .contact__footer-tags { background: var(--ink); color: var(--paper); padding: 16px 64px; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; letter-spacing: 2px; text-align: center; opacity: 0.95; }

  /* 預覽用 */
  .preview-label { position: absolute; top: -22px; left: 0; font-family: 'Playfair Display', serif; font-style: italic; font-size: 14px; color: rgba(255, 255, 255, 0.85); background: rgba(92, 72, 48, 0.6); padding: 4px 12px; border-radius: 2px; letter-spacing: 2px; z-index: 10; }
  .page-stack-wrap { padding: 50px 0 80px; }

  /* 固定品牌句（寫死） */
  .BRAND_TAGLINE_EN::before { content: "Growing Deep. Giving True."; }
  .FOOTER_TAGLINE_EN::before { content: "From Earth, With Care."; }
  .FOOTER_BRAND::before { content: "WISHLITE 韻手作永續"; }
</style>
</head>
<body>

<div class="page-stack-wrap" id="proposal-stack"></div>

<script>
(function() {
  const data = JSON.parse(document.getElementById('proposalData').textContent);
  const meta = data.meta;

  // 固定品牌句（不可變）
  const BRAND_TAGLINE_EN = "Growing Deep. Giving True.";
  const FOOTER_TAGLINE_EN = "From Earth, With Care.";
  const FOOTER_BRAND = "WISHLITE 韻手作永續";

  const totalPages = 9 + data.products.length; // 9 個固定 + N 個產品頁
  const useBrackets = meta.use_title_brackets;
  const wrapTitle = (t) => useBrackets ? `《${t}》` : t;

  const WORDMARK = `
    <div class="topbar__wordmark">
      <span class="en">Wishlite</span>
      <span class="zh">韻 手 作 永 續</span>
    </div>`;

  const metaBadge = `
    <div class="meta-badge">
      <span>${meta.proposal_type}</span>
      <span>${meta.client_type}</span>
      <span>${meta.budget_level}預算</span>
    </div>`;

  const topbar = (pn, label) => `
    <header class="topbar">
      <div class="topbar__brand">
        ${WORDMARK}
        <div class="topbar__divider"></div>
        <div class="topbar__tagline">${BRAND_TAGLINE_EN}</div>
      </div>
      <div class="topbar__pageno">${String(pn).padStart(2,'0')} / ${String(totalPages).padStart(2,'0')}<span class="section-label">${label}</span></div>
    </header>`;

  const footer = (pageName) => `
    <footer class="footer">
      <span class="footer__page-name">${pageName}</span>
      <span class="footer__line">${FOOTER_TAGLINE_EN}<span class="dot">　·　</span>${FOOTER_BRAND}</span>
    </footer>`;

  // ========== P01 Cover ==========
  const c = data.cover;
  const p01 = `
    <div class="page page--cover">
      <span class="preview-label">P01 · COVER</span>
      <div class="cover__bg" style="background-image: url('${c.background_image}'); background-position: right center;"></div>
      <div class="cover__overlay"></div>
      <div class="page__paper-texture"></div>
      <div class="page__inner">
        <header class="cover__topbar">
          <div class="topbar__brand">
            ${WORDMARK}
            <div class="topbar__divider"></div>
            <div class="topbar__tagline">${BRAND_TAGLINE_EN}</div>
          </div>
          <div class="cover__date">${c.date}</div>
        </header>
        <main class="cover__main">
          <div class="cover__eyebrow-line">${c.year} ${c.client} ・ ${c.brand_name}</div>
          <div class="cover__series-label">${c.series_label}</div>
          <h1 class="cover__title">${wrapTitle(c.proposal_title)}</h1>
          <div class="cover__tagline-en">${BRAND_TAGLINE_EN}</div>
          <div class="cover__highlight-block">
            <div class="cover__highlight">${c.highlight}</div>
            <p class="cover__subtitle">${c.proposal_subtitle}</p>
          </div>
        </main>
        <footer class="cover__footer">
          <span class="footer__page-name">P01 · COVER</span>
          <span class="footer__line">${FOOTER_TAGLINE_EN}<span class="dot">　·　</span>${FOOTER_BRAND}</span>
        </footer>
      </div>
    </div>`;

  // ========== P02 Pillars ==========
  const pl = data.pillars;
  const pillars = pl.items.map(item => `
    <div class="pillar">
      <div class="pillar__num-box" style="border-color: ${item.color}; color: ${item.color};">${item.num}</div>
      <div class="pillar__title">${item.pillar_title}</div>
      <div class="pillar__subtitle">${item.pillar_subtitle}</div>
      <div class="pillar__body">${item.pillar_description}</div>
      <div class="pillar__label">${item.label}</div>
    </div>`).join('');
  const p02 = `
    <div class="page page--pillars">
      <span class="preview-label">P02 · PILLARS</span>
      ${metaBadge}
      <div class="page__paper-texture"></div>
      <div class="page__inner">
        ${topbar(2, 'PILLARS')}
        <main class="page__main">
          <h1 class="pillars__title">${pl.title}</h1>
          <div class="pillars__grid">${pillars}</div>
        </main>
        ${footer('P02 · PILLARS')}
      </div>
    </div>`;

  // ========== P03 Overview ==========
  const ov = data.overview;
  const ovItems = ov.product_list.map(item => `
    <div class="overview__item">
      <div class="overview__item-no">No. ${item.no}</div>
      <div class="overview__item-name">${item.name}</div>
      <div class="overview__item-tag">${item.tag}</div>
    </div>`).join('');
  const p03 = `
    <div class="page page--overview">
      <span class="preview-label">P03 · OVERVIEW</span>
      <div class="page__paper-texture"></div>
      <div class="page__inner">
        ${topbar(3, 'OVERVIEW')}
        <main class="page__main">
          <h1 class="overview__title">${ov.project_name}</h1>
          <p class="overview__subtitle">${ov.overview_summary}</p>
          <div class="overview__list">${ovItems}</div>
        </main>
        ${footer('P03 · OVERVIEW')}
      </div>
    </div>`;

  // ========== P04 WHY US ==========
  const wu = data.why_us;
  const p04 = `
    <div class="page page--why">
      <span class="preview-label">P04 · WHY US</span>
      <div class="page__paper-texture"></div>
      <div class="page__inner">
        ${topbar(4, 'WHY US')}
        <main class="page__main">
          <h1 class="why__title">${wu.title}</h1>
          <p class="why__subtitle">${wu.subtitle}</p>
          <div class="why__columns">
            <div class="why__col">
              <div class="why__icon">材</div>
              <div class="why__col-title">材料的厚實</div>
              <div class="why__col-body">${wu.why_material}</div>
            </div>
            <div class="why__col">
              <div class="why__icon">藝</div>
              <div class="why__col-title">工藝的厚工</div>
              <div class="why__col-body">${wu.why_craft}</div>
            </div>
            <div class="why__col">
              <div class="why__icon">情</div>
              <div class="why__col-title">情感的厚禮</div>
              <div class="why__col-body">${wu.why_emotion}</div>
            </div>
          </div>
        </main>
        ${footer('P04 · WHY US')}
      </div>
    </div>`;

  // ========== P05 客製化（🆕）==========
  const cu = data.customization;
  const cuItems = cu.items.map(it => `
    <div class="cust__item">
      <div class="cust__item-icon">${it.icon}</div>
      <div>
        <div class="cust__item-label">${it.label}</div>
        <div class="cust__item-body">${it.body}</div>
      </div>
    </div>`).join('');
  const p05 = `
    <div class="page page--customization">
      <span class="preview-label">P05 · CUSTOMIZATION 🆕</span>
      <div class="page__paper-texture"></div>
      <div class="page__inner">
        ${topbar(5, 'CUSTOMIZATION')}
        <main class="page__main">
          <h1 class="cust__title">${cu.title}</h1>
          <p class="cust__subtitle">${cu.subtitle}</p>
          <div class="cust__grid">${cuItems}</div>
          <div class="cust__note">${cu.custom_note}</div>
        </main>
        ${footer('P05 · CUSTOMIZATION')}
      </div>
    </div>`;

  // ========== P06 執行方式（🆕，活動/禮品 toggle）==========
  const ex = data.execution;
  const steps = ex.execution_mode === '活動' ? ex.steps_event : ex.steps_gift;
  const stepHtml = steps.map(s => `
    <div class="exec__step">
      <div class="exec__step-no">${s.no}</div>
      <div class="exec__step-label">${s.label}</div>
      <div class="exec__step-duration">${s.duration}</div>
      <div class="exec__step-body">${s.body}</div>
    </div>`).join('');
  const p06 = `
    <div class="page page--execution">
      <span class="preview-label">P06 · EXECUTION 🆕</span>
      <div class="page__paper-texture"></div>
      <div class="page__inner">
        ${topbar(6, 'EXECUTION')}
        <main class="page__main">
          <h1 class="exec__title">${ex.title}</h1>
          <p class="exec__subtitle">${ex.subtitle}</p>
          <span class="exec__mode-tag">${ex.execution_mode === '活動' ? '活動體驗模式' : '禮品交付模式'}</span>
          <div class="exec__steps">${stepHtml}</div>
          <p class="exec__note">${ex.execution_note}</p>
        </main>
        ${footer('P06 · EXECUTION')}
      </div>
    </div>`;

  // ========== P07–P10 Products ==========
  const productPages = data.products.map((p, i) => {
    const pn = 7 + i;
    const sdgs = p.product_sdgs.map(s => `<span class="sdg-tag">${s}</span>`).join('');
    return `
      <div class="page page--product">
        <span class="preview-label">P${String(pn).padStart(2,'0')} · PRODUCT ${p.no}</span>
        <div class="page__paper-texture"></div>
        <div class="page__inner">
          ${topbar(pn, `PRODUCT ${p.no}`)}
          <main class="page__main">
            <div class="product__image">
              <div class="product__image-bg" style="background-image: url('${p.image}');"></div>
            </div>
            <div class="product__info">
              <div class="product__no">${meta.mode === '厚禮模式' ? '厚禮' : '方案'} ${p.no}</div>
              <h2 class="product__name">${p.product_name}</h2>
              <div class="product__subtitle">${p.product_tagline}</div>
              <div class="product__section">
                <div class="product__section-label">文化意義</div>
                <p class="product__section-body">${p.product_culture}</p>
              </div>
              <div class="product__section">
                <div class="product__section-label">永續價值</div>
                <p class="product__section-body">${p.product_esg}</p>
              </div>
              <div class="product__section">
                <div class="product__section-label">SDGs 對應</div>
                <div class="product__sdgs">${sdgs}</div>
              </div>
            </div>
          </main>
          ${footer(`P${String(pn).padStart(2,'0')} · PRODUCT ${p.no}`)}
        </div>
      </div>`;
  }).join('');

  const productCount = data.products.length;
  const closingPN = 7 + productCount;
  const impactPN = closingPN - 1 + 0; // wait: order is products → impact → closing → contact

  // 重新計算頁碼：P07~P(6+N) products → P(7+N) impact → P(8+N) closing → P(9+N) contact
  const impactPageNo = 7 + productCount;
  const closingPageNo = 8 + productCount;
  const contactPageNo = 9 + productCount;

  // ========== P11 ESG 影響力（🆕）==========
  const im = data.impact;
  const metricsHtml = im.metrics.map(m => `
    <div class="impact__metric">
      <div class="impact__metric-value">${m.value}</div>
      <div class="impact__metric-unit">${m.unit}</div>
      <div class="impact__metric-label">${m.label}</div>
      <div class="impact__metric-note">${m.note}</div>
    </div>`).join('');
  const p11 = `
    <div class="page page--impact">
      <span class="preview-label">P${String(impactPageNo).padStart(2,'0')} · IMPACT 🆕</span>
      <div class="page__paper-texture"></div>
      <div class="page__inner">
        ${topbar(impactPageNo, 'ESG IMPACT')}
        <main class="page__main">
          <h1 class="impact__title">${im.title}</h1>
          <p class="impact__subtitle">${im.subtitle}</p>
          <div class="impact__grid">${metricsHtml}</div>
          <div class="impact__statement">${im.impact_statement}</div>
        </main>
        ${footer(`P${String(impactPageNo).padStart(2,'0')} · ESG IMPACT`)}
      </div>
    </div>`;

  // ========== P12 Closing ==========
  const cl = data.closing;
  const p12 = `
    <div class="page page--closing">
      <span class="preview-label">P${String(closingPageNo).padStart(2,'0')} · CLOSING</span>
      <div class="page__paper-texture"></div>
      <div class="page__inner">
        ${topbar(closingPageNo, 'CLOSING')}
        <main class="page__main">
          <div class="closing__accent"></div>
          <h1 class="closing__headline">${cl.headline}</h1>
          <p class="closing__body">${cl.closing_paragraph}</p>
          <div class="closing__signature">${cl.brand_slogan}</div>
        </main>
        ${footer(`P${String(closingPageNo).padStart(2,'0')} · CLOSING`)}
      </div>
    </div>`;

  // ========== P13 Contact (HARD-CODE) ==========
  const p13 = `
    <div class="page page--contact">
      <span class="preview-label">P${String(contactPageNo).padStart(2,'0')} · CONTACT DETAILS（hard-code）</span>
      <div class="page__inner">
        <div class="contact__hero">
          <h1 class="contact__hero-title">CONTACT DETAILS</h1>
        </div>
        <div class="contact__band">
          <div class="contact__band-left">
            <div>
              <div class="contact__brand-mark">Wishlite</div>
              <div class="contact__brand-mark-zh">韻 手 作 永 續</div>
            </div>
            <div class="contact__pills">
              <span class="pill pill--aesthetics">美學</span>
              <span class="pill pill--creativity">創意</span>
              <span class="pill pill--life">生活</span>
              <span class="pill pill--sustainable">永續</span>
            </div>
          </div>
          <div class="contact__info">
            <div class="contact__info-row"><span class="contact__info-icon">@</span>wishlite1111@gmail.com</div>
            <div class="contact__info-row"><span class="contact__info-icon">⌘</span>https://wishlite.com.tw/</div>
            <div class="contact__info-row"><span class="contact__info-icon">●</span>330 桃園市桃園區介壽路 392、394 號</div>
          </div>
        </div>
        <div class="contact__footer-tags">
          永續禮品  ・  PCR 塑木應用  ・  ESG 環保手作  ・  資源循環專業合作  ・  SDGs ・ 循環經濟行動實踐
        </div>
      </div>
    </div>`;

  document.getElementById('proposal-stack').innerHTML = [
    p01, p02, p03, p04, p05, p06, productPages, p11, p12, p13
  ].join('');

  // 主標自動縮字級
  document.fonts.ready.then(() => {
    document.querySelectorAll('.cover__title').forEach(title => {
      const MAX_WIDTH = 1500, MIN_SIZE = 48;
      let size = 76;
      title.style.fontSize = size + 'px';
      while (title.scrollWidth > MAX_WIDTH && size > MIN_SIZE) {
        size -= 1;
        title.style.fontSize = size + 'px';
      }
    });
  });
})();
</script>

</body>
</html>
