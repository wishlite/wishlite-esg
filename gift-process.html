<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合作流程 — Wishlite 韻手作永續禮品</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --moss: #3d5a3e;
            --moss-dark: #2e4630;
            --sage: #7a9e7e;
            --cream: #f5f0e8;
            --soft: #f9f6f0;
            --gold: #c49a3c;
            --gold-light: #d4b06a;
            --mist: #d4e4d0;
            --ink: #1e2a1e;
            --white: #ffffff;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .process-wrapper {
            width: 100%;
            max-width: 1100px;
            text-align: center;
        }

        /* Header */
        .process-label {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--sage);
            margin-bottom: 0.5rem;
        }

        .process-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--moss-dark);
            margin-bottom: 2.5rem;
        }

        /* Horizontal Flow */
        .flow {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 0;
        }

        /* Step Card */
        .step {
            flex: 1;
            max-width: 230px;
            text-align: center;
            position: relative;
        }

        /* Circle Number */
        .step-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--moss);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            position: relative;
            z-index: 2;
            box-shadow: 0 3px 12px rgba(61,90,62,0.2);
        }

        .step-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--moss-dark);
            margin-bottom: 0.35rem;
        }

        .step-tag {
            display: inline-block;
            font-size: 0.68rem;
            letter-spacing: 0.5px;
            color: var(--gold);
            background: rgba(196,154,60,0.1);
            padding: 2px 10px;
            border-radius: 10px;
            margin-bottom: 0.7rem;
            font-weight: 500;
        }

        .step-desc {
            font-size: 0.82rem;
            color: #888;
            line-height: 1.65;
            padding: 0 0.3rem;
        }

        /* Arrow between steps */
        .arrow {
            display: flex;
            align-items: center;
            padding-top: 12px; /* align with circle center */
            flex-shrink: 0;
        }

        .arrow-line {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--mist), var(--sage));
            position: relative;
        }

        .arrow-line::after {
            content: '';
            position: absolute;
            right: -1px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 7px solid var(--sage);
        }

        /* Chips under each step */
        .step-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            margin-top: 0.7rem;
        }

        .chip {
            font-size: 0.68rem;
            color: var(--moss);
            background: var(--soft);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(61,90,62,0.08);
            white-space: nowrap;
        }

        /* ========== Print / Screenshot optimized ========== */
        @media print {
            body { padding: 1rem; }
            .process-wrapper { max-width: 100%; }
        }

        /* ========== Responsive for narrow screens ========== */
        @media (max-width: 800px) {
            .flow {
                flex-direction: column;
                align-items: center;
                gap: 0;
            }

            .step { max-width: 320px; }

            .arrow {
                transform: rotate(90deg);
                padding-top: 0;
                margin: 0.3rem 0;
            }

            .arrow-line { width: 30px; }
        }
    </style>
</head>
<body>

    <div class="process-wrapper">
        <p class="process-label">COOPERATION PROCESS</p>
        <h2 class="process-title">合作流程</h2>

        <div class="flow">

            <!-- Step 1: 選品提案與報價 -->
            <div class="step">
                <div class="step-circle">1</div>
                <div class="step-title">選品提案與報價</div>
                <div class="step-tag">DAY 2–3</div>
                <div class="step-desc">依需求整理 2–3 組 DIY 材料包方案，含品項說明、報價與 ESG 對應。</div>
                <div class="step-chips">
                    <span class="chip">方案比較</span>
                    <span class="chip">報價明細</span>
                </div>
            </div>

            <div class="arrow"><div class="arrow-line"></div></div>

            <!-- Step 2: 確認方案與打樣 -->
            <div class="step">
                <div class="step-circle">2</div>
                <div class="step-title">確認方案與打樣</div>
                <div class="step-tag">DAY 4–6</div>
                <div class="step-desc">確認品項後安排打樣，同步確認 Logo、包裝與品牌故事卡設計。</div>
                <div class="step-chips">
                    <span class="chip">實體打樣</span>
                    <span class="chip">設計確認</span>
                </div>
            </div>

            <div class="arrow"><div class="arrow-line"></div></div>

            <!-- Step 3: 量產製作 -->
            <div class="step">
                <div class="step-circle">3</div>
                <div class="step-title">量產製作</div>
                <div class="step-tag">DAY 7–12</div>
                <div class="step-desc">依數量進行材料包組裝，每份逐一品檢，確保內容齊全、品質一致。</div>
                <div class="step-chips">
                    <span class="chip">組包分裝</span>
                    <span class="chip">品質檢查</span>
                </div>
            </div>

            <div class="arrow"><div class="arrow-line"></div></div>

            <!-- Step 4: 包裝出貨 -->
            <div class="step">
                <div class="step-circle">4</div>
                <div class="step-title">包裝出貨</div>
                <div class="step-tag">DAY 13–14</div>
                <div class="step-desc">完成包裝並安排物流，提供出貨通知與追蹤資訊，準時送達活動現場。</div>
                <div class="step-chips">
                    <span class="chip">物流追蹤</span>
                    <span class="chip">準時交付</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
